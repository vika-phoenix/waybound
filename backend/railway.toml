[build]
builder = "nixpacks"

[deploy]
startCommand = "export DJANGO_SETTINGS_MODULE=waybound.settings.prod && python manage.py migrate --no-input && python manage.py collectstatic --no-input && python manage.py create_staff_roles && python manage.py createsuperuser --no-input --email $DJANGO_SUPERUSER_EMAIL || true && gunicorn waybound.wsgi --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --preload"
healthcheckPath = "/api/v1/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
